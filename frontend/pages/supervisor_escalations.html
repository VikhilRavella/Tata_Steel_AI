<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escalations - Maintenance Wizard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/components.css">
  <script src="../js/rbac.js?v=2.1"></script>

  <style>
    .app-container { display: flex; height: 100vh; overflow: hidden; }
    .top-nav { height: 52px; background-color: var(--bg-card); border-bottom: 1px solid var(--border-default); display: flex; align-items: center; justify-content: space-between; padding: 0 var(--spacing-6); position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: var(--spacing-3); width: 220px; }
    .nav-brand i { color: var(--primary); font-size: 20px; }
    .nav-title { font-weight: 600; font-size: 16px; }
    .search-bar { position: relative; width: 320px; }
    .search-input { width: 100%; height: 32px; border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 0 12px; background-color: var(--bg-page); }
    .nav-actions { display: flex; align-items: center; gap: var(--spacing-4); }
    .avatar { height: 32px; width: 32px; border-radius: 50%; background-color: var(--status-warning); color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
    .sidebar { width: 220px; background-color: var(--bg-card); border-right: 1px solid var(--border-default); height: calc(100vh - 52px); margin-top: 52px; display: flex; flex-direction: column; flex-shrink: 0; }
    .user-card { padding: var(--spacing-5); border-bottom: 1px solid var(--border-default); display: flex; flex-direction: column; align-items: center; text-align: center; }
    .nav-menu { padding: var(--spacing-4) 0; flex-grow: 1; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; padding: var(--spacing-3) var(--spacing-5); color: var(--text-secondary); text-decoration: none; font-weight: 500; gap: var(--spacing-3); }
    .nav-item.active { color: var(--primary); background-color: var(--status-success-bg); border-right: 3px solid var(--primary); }
    .main-content { flex-grow: 1; height: calc(100vh - 52px); margin-top: 52px; overflow-y: auto; padding: var(--spacing-6) var(--spacing-8); background-color: var(--bg-page); }
  </style>
</head>
<body>
<div class="sidebar-overlay" onclick="document.querySelector('.sidebar').classList.remove('active'); this.classList.remove('active');"></div>

  <header class="top-nav">
    <div class="nav-brand">
      <i class="fa-solid fa-wrench"></i>
      <div class="nav-title">Maintenance Wizard</div>
    </div>
    <div class="search-bar"><input type="text" class="search-input" placeholder="Search team, equipment..."></div>
    <div class="nav-actions">
      <span class="badge status-warning">Supervisor</span>
      <div class="avatar profile-icon">SJ</div>
      <a href="index.html" style="color: var(--text-secondary)"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
    </div>
  </header>

  <div class="app-container">
    <aside class="sidebar">
      <div class="user-card">
        <div class="avatar profile-icon" style="width:48px;height:48px;font-size:18px;margin-bottom:8px;">SJ</div>
        <div class="profile-name" style="font-weight:600">Sarah Jenkins</div>
        <span class="badge status-warning profile-role">Shift Supervisor</span>
      </div>
      <nav class="nav-menu">
        <a href="home_page_supervisor.html" class="nav-item"><i class="fa-solid fa-users"></i> Team Overview</a>
        <a href="supervisor_escalations.html" class="nav-item active"><i class="fa-solid fa-clock-rotate-left"></i> Escalations</a>
        <a href="supervisor_documents.html" class="nav-item"><i class="fa-solid fa-file-pdf"></i> Manage Docs</a>
        <a href="supervisor_plant_health.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Plant Health</a>
      </nav>
    </aside>

    <main class="main-content">
      <h2 style="margin-bottom: var(--spacing-6)">Escalations Triage</h2>
      
      <div id="triage-detail-container"></div>
    </main>
  </div>
  
  <script>
    let currentSessionId = null;

    async function loadEscalationDetail() {
      const urlParams = new URLSearchParams(window.location.search);
      currentSessionId = urlParams.get('session_id');
      const container = document.getElementById('triage-detail-container');
      const token = localStorage.getItem('access_token');

      if (!currentSessionId || !token) {
        container.innerHTML = '<div class="card" style="text-align: center; color: var(--text-secondary); padding: var(--spacing-6);">No escalation selected. Please select one from the dashboard.</div>';
        return;
      }

      container.innerHTML = '<div class="card" style="text-align: center; padding: var(--spacing-6);">Loading escalation details...</div>';

      try {
        const response = await fetch(`http://127.0.0.1:8000/api/supervisor/escalations/${currentSessionId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
          const data = await response.json();
          
          container.innerHTML = `
            <div class="card" style="margin-bottom: var(--spacing-6);">
              <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--spacing-4);">
                <div>
                  <h3>${data.equipment_name} Issue</h3>
                  <span class="text-secondary">Escalated by: ${data.engineer_name} (${data.specialization}) • ${data.time_elapsed} ago</span>
                </div>
                <span class="badge status-critical">High Priority</span>
              </div>
              
              <div style="background-color: var(--bg-page); padding: var(--spacing-4); border-radius: var(--radius-md); margin-bottom: var(--spacing-4);">
                <h4 style="margin-bottom: var(--spacing-2); color: var(--primary);"><i class="fa-solid fa-robot"></i> AI Root Cause Analysis</h4>
                <p class="text-secondary" style="font-size: 14px; line-height: 1.5;">${data.ai_summary}</p>
              </div>
              
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-4); margin-bottom: var(--spacing-4);">
                <div>
                  <span class="text-secondary font-medium" style="display: block; font-size: 13px;">Downtime Impact (MTTR)</span>
                  <span style="font-weight: 600; font-size: 18px;">${data.mttr_estimate}</span>
                </div>
                <div>
                  <span class="text-secondary font-medium" style="display: block; font-size: 13px;">Specialized Personnel Needed</span>
                  <span style="font-weight: 600; font-size: 18px;">TBD</span>
                </div>
              </div>
              
              <div style="display: flex; gap: var(--spacing-3);">
                <button class="btn btn-primary" onclick="approveWaiver()">Approve Cross-Domain Waiver</button>
                <button class="btn btn-secondary" onclick="reassignTeam()">Dispatch Support Team</button>
              </div>
            </div>
          `;
        } else {
          container.innerHTML = '<div class="card" style="text-align: center; color: var(--status-critical); padding: var(--spacing-6);">Failed to load escalation data or unauthorized.</div>';
        }
      } catch (e) {
        console.error(e);
        container.innerHTML = '<div class="card" style="text-align: center; color: var(--status-critical); padding: var(--spacing-6);">Network error fetching details.</div>';
      }
    }

    async function approveWaiver() {
      if (!currentSessionId) return;
      const token = localStorage.getItem('access_token');
      try {
        const response = await fetch(`http://127.0.0.1:8000/api/sessions/${currentSessionId}/approve-waiver`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
          alert('Cross-Domain Intervention Approved. Notification sent to Engineer.');
        } else {
          alert('Failed to approve waiver.');
        }
      } catch (e) {
        alert('Network error.');
      }
    }

    async function reassignTeam() {
      if (!currentSessionId) return;
      const token = localStorage.getItem('access_token');
      const newEng = prompt("Enter the ID of the new engineer to dispatch:");
      if (!newEng) return;
      
      try {
        const response = await fetch(`http://127.0.0.1:8000/api/sessions/${currentSessionId}/reassign`, {
          method: 'PUT',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` 
          },
          body: JSON.stringify({ new_engineer_id: parseInt(newEng) })
        });
        if (response.ok) {
          alert('Team successfully dispatched and session reassigned.');
          window.location.href = 'home_page_supervisor.html';
        } else {
          alert('Failed to reassign.');
        }
      } catch (e) {
        alert('Network error.');
      }
    }

    document.addEventListener('DOMContentLoaded', loadEscalationDetail);
  </script>
</body>
</html>
