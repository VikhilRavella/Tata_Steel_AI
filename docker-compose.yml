# ==============================================================================
# STARTUP INSTRUCTIONS
# 
# 1. Environment Setup:
#    Copy the provided .env.example file to .env and configure any secrets:
#    cp .env.example .env
#
# 2. Start the Application:
#    Build and run the Docker containers in detached mode:
#    docker-compose up --build -d
#
# 3. Initialize Ollama Models:
#    The first time you start the project, pull the required models into the
#    tata_ollama container (this may take a few minutes depending on your connection):
#    docker exec -it tata_ollama ollama pull mistral
#    docker exec -it tata_ollama ollama pull llava
#
# 4. Access the Application:
#    - Frontend Web Interface: http://localhost:3000
#    - Backend API & Docs:     http://localhost:8000/docs
# ==============================================================================

version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: tata_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build: .
    container_name: tata_backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=sqlite:////app/data/maintenance.db
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - CHROMA_DB_PATH=/app/chroma_db
    volumes:
      - ./backend:/app/data
      - ./backend/chroma_db:/app/chroma_db
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: tata_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  ollama_data:
